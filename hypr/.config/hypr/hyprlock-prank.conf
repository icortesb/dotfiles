# Hyprlock Prank Config - Fullscreen transparent with conditional warning

general {
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 0
    blur_size = 1
    contrast = 1.0
    brightness = 1.0
    vibrancy = 0.0
    noise = 0.0
}

input-field {
    monitor =
    size = 100%, 200
    outline_thickness = 0
    outer_color = rgba(255, 255, 255, 0)
    inner_color = rgba(0, 0, 0, 0)
    font_color = rgba(255, 255, 255, 0)
    placeholder_text = 
    hide_input = false
    rounding = 0
    fail_color = rgba(0, 0, 0, 0)
    check_color = rgba(0, 0, 0, 0)
    fail_text = <span size="48000" foreground="##ffff00" font_weight="bold">⚠ SECURITY ALERT ⚠</span>
    position = 0, -250
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:500] /bin/bash -c 'if [ "$ATTEMPTS" -gt 0 ]; then echo "⚠ UNAUTHORIZED ACCESS DETECTED ⚠"; fi'
    font_size = 24
    font_family = monospace
    color = rgba(255, 0, 0, 1)
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:500] /bin/bash -c 'if [ "$ATTEMPTS" -gt 0 ]; then echo "Multiple failed login attempts detected"; fi'
    font_size = 18
    font_family = monospace
    color = rgba(255, 100, 100, 1)
    position = 0, -40
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:500] /bin/bash -c 'if [ "$ATTEMPTS" -gt 0 ]; then echo "⚠ WARNING: System will initiate data deletion"; fi'
    font_size = 16
    font_family = monospace
    color = rgba(255, 150, 150, 1)
    position = 0, 20
    halign = center
    valign = center
}