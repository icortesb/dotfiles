# Hyprlock - No visible input, unlocks with correct password silently

general {
    disable_loading_bar = true
    grace = 2
    hide_cursor = true
    no_fade_in = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 0
    blur_size = 1
    contrast = 1.0
    brightness = 1.0
    vibrancy = 0.0
    noise = 0.0
}

input-field {
    monitor =
    size = 1, 1
    outline_thickness = 0
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0)
    font_color = rgba(0, 0, 0, 0)
    placeholder_text = 
    hide_input = true
    rounding = 0
    fail_text = 
    fail_timeout = 0
    position = -10000, -10000
}